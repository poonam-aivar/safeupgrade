name: SafeUpgrade

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 6 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  safeupgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build SafeUpgrade
        run: go build -o safeupgrade .
        working-directory: .

      - name: Run SafeUpgrade scan
        run: ./safeupgrade scan --policy configs/policy.yaml
        env:
          AWS_REGION: us-east-1

      - name: Run SafeUpgrade upgrade
        run: ./safeupgrade upgrade --policy configs/policy.yaml
        env:
          AWS_REGION: us-east-1

      - name: Create PR if changes exist
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            BRANCH="safeupgrade/$(date +%Y%m%d)"
            git checkout -b "$BRANCH"
            git add .
            git commit -m "chore(deps): safe dependency upgrades by SafeUpgrade Agent"
            git push -u origin "$BRANCH"
            gh pr create \
              --title "chore(deps): SafeUpgrade automated dependency update" \
              --body-file upgrade_report.json \
              --base main
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
